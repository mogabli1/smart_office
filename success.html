<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Success | SmartOffice AI</title>
  <link rel="stylesheet" href="static/css/landing.css">
  <style>
    .success-wrapper {
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 0 20px;
    }
    .success-card {
      background: var(--glass-bg);
      backdrop-filter: var(--glass-blur);
      border: 1px solid var(--glass-border);
      padding: 60px;
      border-radius: 32px;
      max-width: 600px;
    }
    .success-icon {
      font-size: 4rem;
      color: var(--accent-color);
      margin-bottom: 30px;
    }
    h1 { margin-bottom: 20px; font-size: 2.5rem; }
    p { color: var(--text-light); font-size: 1.2rem; margin-bottom: 40px; }
  </style>
</head>
<body>
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>

  <div class="success-wrapper">
    <div class="success-card reveal active">
      <div class="success-icon"><i class="fa-solid fa-circle-check"></i></div>
      <h1>Request Received!</h1>
      <p>Thank you for reaching out. Our team will review your message and get back to you within 24 hours.</p>
      <a href="/index.html" class="btn btn-primary">Back to Homepage</a>
    </div>
  </div>

  <script src="static/js/script.js"></script>
</body>
</html>
