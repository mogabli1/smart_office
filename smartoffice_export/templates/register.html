{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-5">
    <div class="card shadow-sm">
      <div class="card-body">
        <h3 class="mb-3">{{ t('sign_up') }}</h3>
        <form method="post">
          <div class="mb-3">
            <label class="form-label">{{ t('name') }}</label>
            <input name="name" type="text" class="form-control" placeholder="{{ t('name') }}" value="{{ name or '' }}" required>
          </div>
          <div class="mb-3">
            <label class="form-label">{{ t('email') }}</label>
            <input name="email" type="email" class="form-control" placeholder="you@example.com" value="{{ email or '' }}" required>
          </div>
          <div class="mb-3">
            <label class="form-label">{{ t('password') }}</label>
            <input name="password" type="password" class="form-control" placeholder="••••••••" required>
          </div>
          <button type="submit" class="btn btn-primary w-100">{{ t('sign_up') }}</button>
        </form>
        <hr>
        <p class="mb-0">{{ t('already_have_account') }} <a href="{{ url_for('login') }}">{{ t('login') }}</a></p>
      </div>
    </div>
  </div>
</div>
{% endblock %}
