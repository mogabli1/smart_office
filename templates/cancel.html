{% extends "base.html" %}
{% block content %}
<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-md-6 text-center">
      <div class="mb-4">
        <i class="bi bi-x-circle-fill text-warning" style="font-size: 6rem;"></i>
      </div>
      <h1 class="display-5 fw-bold mb-3">Payment Cancelled</h1>
      <p class="lead text-muted mb-4">
        Your subscription payment was cancelled. No charges were made.
      </p>
      <div class="card shadow-sm mb-4">
        <div class="card-body p-4">
          <p class="mb-0">You can try again anytime to unlock premium features.</p>
        </div>
      </div>
      <div class="d-flex gap-3 justify-content-center">
        <a href="{{ url_for('pricing') }}" class="btn btn-primary px-4">
          <i class="bi bi-arrow-left me-2"></i>Back to Pricing
        </a>
        <a href="{{ url_for('index') }}" class="btn btn-outline-secondary px-4">
          <i class="bi bi-house-door me-2"></i>Go to Dashboard
        </a>
      </div>
    </div>
  </div>
</div>
{% endblock %}
