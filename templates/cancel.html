{% extends "base.html" %}
{% block content %}
<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-md-6 text-center">
      <div class="mb-4">
        <i class="bi bi-x-circle-fill text-warning" style="font-size: 6rem;"></i>
      </div>
      <h1 class="display-5 fw-bold mb-3">{{ t('payment_cancelled') }}</h1>
      <p class="lead text-muted mb-4">
        {{ t('payment_cancel_msg') }}
      </p>
      <div class="card shadow-sm mb-4">
        <div class="card-body p-4">
          <p class="mb-0">{{ t('try_again') }}</p>
        </div>
      </div>
      <div class="d-flex gap-3 justify-content-center">
        <a href="{{ url_for('pricing') }}" class="btn btn-primary px-4">
          <i class="bi bi-arrow-left {% if lang == 'ar' %}ms-2{% else %}me-2{% endif %}"></i>{{ t('back_to_pricing') }}
        </a>
        <a href="{{ url_for('index') }}" class="btn btn-outline-secondary px-4">
          <i class="bi bi-house-door {% if lang == 'ar' %}ms-2{% else %}me-2{% endif %}"></i>{{ t('go_to_dashboard') }}
        </a>
      </div>
    </div>
  </div>
</div>
{% endblock %}
