{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-5">
    <div class="card shadow-sm">
      <div class="card-body">
        <h3 class="mb-3">{{ t('sign_in') }}</h3>
        <form method="post">
          <div class="mb-3">
            <label class="form-label">{{ t('email') }}</label>
            <input name="email" type="email" class="form-control" placeholder="you@example.com" required>
          </div>
          <div class="mb-3">
            <label class="form-label">{{ t('password') }}</label>
            <input name="password" type="password" class="form-control" placeholder="••••••••" required>
          </div>
          <button type="submit" class="btn btn-primary w-100">{{ t('login') }}</button>
        </form>
        <hr>
        <p class="mb-0">{{ t('dont_have_account') }} <a href="{{ url_for('register') }}">{{ t('sign_up') }}</a></p>
      </div>
    </div>
  </div>
</div>
{% endblock %}
