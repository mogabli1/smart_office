{% extends "base.html" %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-5">
    <div class="card shadow-sm">
      <div class="card-body">
        <h3 class="mb-3">Create account</h3>
        <form method="post">
          <div class="mb-3">
            <label class="form-label">Full name</label>
            <input name="name" type="text" class="form-control" placeholder="Your Name" value="{{ name or '' }}" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Email</label>
            <input name="email" type="email" class="form-control" placeholder="you@example.com" value="{{ email or '' }}" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Password</label>
            <input name="password" type="password" class="form-control" placeholder="At least 8 characters" required>
          </div>
          <button type="submit" class="btn btn-primary w-100">Create account</button>
        </form>
        <hr>
        <p class="mb-0">Already have an account? <a href="{{ url_for('login') }}">Sign in</a></p>
      </div>
    </div>
  </div>
</div>
{% endblock %}
